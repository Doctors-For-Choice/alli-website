name: Deploy React App

on:
  push:
    branches:
      - master

permissions:
  pages: write
  contents: read
  checks: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Predeploy (build)
        id: predeploy
        run: |
          set -e
          npm run predeploy

      - name: Create check run for predeploy result
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const conclusion = (process.exitCode && process.exitCode !== 0) ? 'failure' : 'success';
            await github.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'predeploy-build',
              head_sha: context.sha,
              status: 'completed',
              conclusion,
              output: {
                title: 'Predeploy build',
                summary: conclusion === 'success' ? 'Predeploy succeeded' : 'Predeploy failed'
              }
            });
