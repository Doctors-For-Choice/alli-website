name: Deploy React App

on:
  push:
    branches:
      - master

permissions:
  pages: write
  contents: read
  checks: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Predeploy (build)
        id: predeploy
        run: |
          set -e
          npm run predeploy
